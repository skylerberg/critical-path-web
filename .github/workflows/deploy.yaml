name: production-deploy
run-name: Production Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main
concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true
jobs:
  deploy-to-production:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      BUCKET: critical-path-web-prod

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/1085332810847/locations/global/workloadIdentityPools/default-pool/providers/github-provider'
          service_account: 'github-actions-service@realm-construction.iam.gserviceaccount.com'

      - uses: 'google-github-actions/setup-gcloud@v3'
        with:
          cache: true

      # `gcloud storage` rather than `gsutil`: gsutil cannot consume the
      # workload-identity-federation credentials set up by auth@v3.
      # Hashed assets first, then the entry points that reference them, so a
      # half-finished deploy never serves an index.html pointing at missing files.
      - name: 'Upload site'
        run: |
          immutable='public, max-age=31536000, immutable'
          nocache='no-cache, no-store, must-revalidate'
          pids=()
          gcloud storage cp --recursive --gzip-local-all \
            --cache-control="$immutable" \
            dist/assets "gs://$BUCKET" & pids+=($!)
          gcloud storage cp --gzip-local-all \
            --cache-control="$immutable" \
            dist/workbox-*.js "gs://$BUCKET/" & pids+=($!)
          gcloud storage cp dist/*.png dist/favicon.svg "gs://$BUCKET/" & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
          pids=()
          gcloud storage cp --gzip-local-all \
            --cache-control="$nocache" \
            dist/index.html dist/sw.js "gs://$BUCKET/" & pids+=($!)
          gcloud storage cp --gzip-local-all \
            --cache-control="$nocache" \
            --content-type='application/manifest+json' \
            dist/manifest.webmanifest "gs://$BUCKET/" & pids+=($!)
          for pid in "${pids[@]}"; do wait "$pid"; done
